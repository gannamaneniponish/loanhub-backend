# =============================================
# LoanHub Backend - Application Configuration
# =============================================

# Server
server.port=${PORT:8080}

# ── DATABASE ──
# Uses environment variables on Render (PostgreSQL)
# Falls back to H2 for local development

# MySQL Configuration
#spring.datasource.url=jdbc:mysql://localhost:3306/loanhub
#spring.datasource.username=root
#spring.datasource.password=Ponish@2128
#spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.datasource.url=jdbc:h2:mem:testdb
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

spring.jpa.database-platform=org.hibernate.dialect.H2Dialect

spring.h2.console.enabled=true

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true


# JWT
jwt.secret=LoanHubSuperSecretKey2024!ChangeThisInProductionWithALongRandomString
jwt.expiration=86400000

# CORS
app.cors.allowed-origins=http://localhost:5173,http://localhost:3000,https://loanhub-frontend.vercel.app

# Logging
logging.level.com.loanhub=INFO
logging.level.org.springframework.security=WARN
