# =============================================
# LoanHub Backend - Application Configuration
# =============================================

# Server
server.port=8080

# ── DATABASE (H2 in-memory — works out-of-the-box, no MySQL needed to start) ──
# To switch to MySQL, comment out the H2 block and uncomment MySQL block below.

# H2 In-Memory Database (default - ready to run immediately)
spring.datasource.url=jdbc:h2:mem:loanhubdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# ── MySQL (uncomment when ready for production) ──
# spring.datasource.url=jdbc:mysql://localhost:3306/loanhubdb?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
# spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
# spring.datasource.username=root
# spring.datasource.password=your_mysql_password
# spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true

# JWT
jwt.secret=LoanHubSuperSecretKey2024!ChangeThisInProductionWithALongRandomString
jwt.expiration=86400000

# CORS - Allow React frontend (Vite default port)
app.cors.allowed-origins=http://localhost:5173,http://localhost:3000,http://localhost:4173

# Logging
logging.level.com.loanhub=INFO
logging.level.org.springframework.security=WARN
