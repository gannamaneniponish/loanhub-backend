# =============================================
# LoanHub Backend - Application Configuration
# =============================================

# Server
server.port=${PORT:8080}

# ── DATABASE ──
# Uses environment variables on Render (PostgreSQL)
# Falls back to H2 for local development

spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:h2:mem:loanhubdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:sa}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:}

# Auto-detect driver from URL
spring.datasource.driver-class-name=${SPRING_DATASOURCE_DRIVER:}

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=${SPRING_JPA_HIBERNATE_DDL_AUTO:create-drop}
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true

# H2 Console (only for local dev)
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# JWT
jwt.secret=LoanHubSuperSecretKey2024!ChangeThisInProductionWithALongRandomString
jwt.expiration=86400000

# CORS
app.cors.allowed-origins=http://localhost:5173,http://localhost:3000,https://loanhub-frontend.vercel.app

# Logging
logging.level.com.loanhub=INFO
logging.level.org.springframework.security=WARN
